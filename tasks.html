<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDo List | Minhas Tarefas</title>
    <!-- GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- BOOTSTRAP ICONS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <!-- css -->
    <link rel="stylesheet" href="./css/global.css" />
    <link rel="stylesheet" href="./css/tasks.css" />
  </head>
  <body>
    <div class="app-layout">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div>
          <div class="logo">
            <div class="logo-icon">
              <i class="bi bi-check2-square"></i>
            </div>
            <h2>ToDo<span>List</span></h2>
          </div>

          <nav>
            <a href="./dashboard.html">
              <i class="bi bi-grid"></i>
              <span>Meus Quadros</span>
            </a>

            <a href="#" class="active">
              <i class="bi bi-check2-square"></i>
              <span>Minhas Tarefas</span>
            </a>

            <a href="./agenda.html">
              <i class="bi bi-calendar-event"></i>
              <span>Agenda</span>
            </a>

            <a href="./settings.html">
              <i class="bi bi-gear"></i>
              <span>Configurações</span>
            </a>
          </nav>
        </div>
        <button class="logout-btn">
          <i class="bi bi-box-arrow-right"></i>
          Sair
        </button>
      </aside>

      <!-- MAIN -->
      <main class="main-content">
        <!-- HEADER -->
        <header class="header">
          <div class="header-info">
            <h1 id="welcome-user">Olá 👋</h1>
            <p>Organize seus quadros e acompanhe suas tarefas.</p>
          </div>

          <div class="header-actions">
            <button class="icon-btn">
              <i class="bi bi-search"></i>
            </button>

            <button class="icon-btn">
              <i class="bi bi-bell"></i>
            </button>

            <img
              src="https://i.pravatar.cc/100?img=12"
              alt="Usuário"
              class="avatar"
            />
          </div>
        </header>

        <!-- CONTEÚDO -->
        <section class="page-content">
          <!-- TÍTULO -->
          <div class="page-header">
            <div>
              <h2 class="section-title">Minhas Tarefas</h2>
              <p class="section-description">
                Organize e acompanhe suas atividades.
              </p>
            </div>
          </div>

          <!-- RESUMO -->
          <section class="summary-grid">
            <article class="summary-card">
              <span class="summary-number" id="total-tasks">32</span>
              <span class="summary-label">Total</span>
            </article>

            <article class="summary-card">
              <span class="summary-number" id="completed-tasks">18</span>
              <span class="summary-label">Concluídas</span>
            </article>

            <article class="summary-card">
              <span class="summary-number" id="pending-tasks">14</span>
              <span class="summary-label">Pendentes</span>
            </article>

            <article class="summary-card">
              <span class="summary-number" id="categories-count">4</span>
              <span class="summary-label">Categorias</span>
            </article>
          </section>

          <!-- AÇÕES -->
          <section class="tasks-toolbar">
            <div class="search-box">
              <i class="bi bi-search"></i>
              <input type="text" placeholder="Buscar tarefas..." />
            </div>
            <div class="filters">
              <button class="filter active" data-filter="all">Todas</button>
              <button class="filter" data-filter="pending">Pendentes</button>
              <button class="filter" data-filter="completed">Concluídas</button>
            </div>
            <select id="sort-tasks" class="sort-select">
              <option value="newest">Mais recentes</option>
              <option value="oldest">Mais antigas</option>
              <option value="priority">Prioridade</option>
              <option value="deadline">Prazo</option>
            </select>
            <button class="new-task-btn" id="new-task-btn">
              <i class="bi bi-plus-lg"></i>
              Nova Tarefa
            </button>
          </section>

          <!-- LISTA -->
          <section class="tasks-list" id="tasks-list"></section>
        </section>
      </main>
    </div>

    <!-- MOBILE NAV -->
    <nav class="mobile-nav">
      <a href="./dashboard.html">
        <i class="bi bi-grid"></i>
      </a>

      <a href="#" class="active">
        <i class="bi bi-check2-square"></i>
      </a>

      <a href="./agenda.html">
        <i class="bi bi-calendar-event"></i>
      </a>

      <a href="./settings.html">
        <i class="bi bi-gear"></i>
      </a>
    </nav>

    <!-- Modal Nova Tarefa -->
    <div class="modal-overlay hidden" id="task-modal">
      <div class="task-modal">
        <div class="modal-header">
          <h2 id="modal-title">Nova Tarefa</h2>
          <button class="close-modal" id="close-modal">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>

        <form id="task-form">
          <div class="form-group">
            <label>Título</label>
            <input
              type="text"
              id="task-title"
              placeholder="Digite a tarefa"
              required
            />
          </div>

          <div class="form-group">
            <label>Categoria</label>
            <select id="task-category">
              <option value="study">Estudos</option>
              <option value="work">Trabalho</option>
              <option value="home">Casa</option>
              <option value="finance">Finanças</option>
            </select>
          </div>

          <div class="form-group">
            <label>Prioridade</label>
            <select id="task-priority">
              <option value="low">Baixa</option>
              <option value="medium">Médio</option>
              <option value="high">Alta</option>
            </select>
          </div>

          <div class="form-group">
            <label>Data</label>
            <input type="date" id="task-date" />
          </div>

          <div class="form-group">
            <label>Hora Inicial</label>
            <input type="time" id="task-start-time" />
          </div>

          <div class="form-group">
            <label>Hora Final</label>
            <input type="time" id="task-end-time" />
          </div>

          <div class="modal-actions">
            <button type="button" class="cancel-btn" id="cancel-task">
              Cancelar
            </button>
            <button type="submit" class="save-btn">Salvar</button>
          </div>
        </form>
      </div>
    </div>
    <script src="./js/app.js"></script>
    <script src="./js/tasks.js"></script>
  </body>
</html>
